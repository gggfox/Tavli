name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      source_branch:
        type: choice
        description: Branch to promote from
        options:
          - staging
        required: true

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  promote:
    name: Fast-forward production from staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROMOTE_TOKEN }}
          ref: ${{ github.event.inputs.source_branch }}
          fetch-depth: 0

      - name: Fast-forward production to staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.event.inputs.source_branch }} production
          git checkout production
          git merge --ff-only origin/${{ github.event.inputs.source_branch }}
          git push origin production
