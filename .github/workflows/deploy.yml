name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      infisical_env:
        required: true
        type: string
        description: Infisical environment slug (staging or prod)
      image_tag:
        required: true
        type: string
        description: GHCR image tag (staging or production)
      health_url:
        required: true
        type: string
        description: Public base URL to poll for the post-deploy health gate (no trailing slash), e.g. https://staging.tavliai.com

concurrency:
  group: deploy-${{ inputs.infisical_env }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tavli
  INFISICAL_PROJECT_ID: da9416bf-a247-4f41-b4c0-14b22f0aaff0
  INFISICAL_API_URL: https://infisical.gggfox.com

jobs:
  deploy:
    name: Deploy ${{ inputs.infisical_env }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - run: pnpm install --frozen-lockfile

      - name: Authenticate to Infisical
        id: infisical
        env:
          INFISICAL_MACHINE_CLIENT_ID: ${{ secrets.INFISICAL_MACHINE_CLIENT_ID }}
          INFISICAL_MACHINE_CLIENT_SECRET: ${{ secrets.INFISICAL_MACHINE_CLIENT_SECRET }}
        run: |
          TOKEN=$(infisical login \
            --method=universal-auth \
            --client-id="$INFISICAL_MACHINE_CLIENT_ID" \
            --client-secret="$INFISICAL_MACHINE_CLIENT_SECRET" \
            --domain="$INFISICAL_API_URL" \
            --plain --silent)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Patch react-dom for Nitro build
        run: |
          for dir in node_modules/.pnpm/react-dom@*/node_modules/react-dom/cjs; do
            cp "$dir/react-dom-client.production.js" \
               "$dir/react-dom-client.development.js" 2>/dev/null || true
          done

      - name: Build app
        env:
          INFISICAL_TOKEN: ${{ steps.infisical.outputs.token }}
          # Baked into the bundle (Vite inlines VITE_* from the build env, same
          # as the Infisical-provided VITE_* values) so the /health route can
          # report the exact commit that is running. Matches the :<sha> image
          # tag pushed below.
          VITE_GIT_SHA: ${{ github.sha }}
        run: |
          infisical run \
            --token="$INFISICAL_TOKEN" \
            --projectId="$INFISICAL_PROJECT_ID" \
            --env="${{ inputs.infisical_env }}" \
            --domain="$INFISICAL_API_URL" \
            --silent \
            -- env NODE_ENV=production VITE_GIT_SHA="$VITE_GIT_SHA" pnpm build

      - name: Deploy Convex
        env:
          INFISICAL_TOKEN: ${{ steps.infisical.outputs.token }}
        run: |
          infisical run \
            --token="$INFISICAL_TOKEN" \
            --projectId="$INFISICAL_PROJECT_ID" \
            --env="${{ inputs.infisical_env }}" \
            --domain="$INFISICAL_API_URL" \
            --silent \
            -- npx convex deploy --yes

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Dokploy webhook
        env:
          INFISICAL_TOKEN: ${{ steps.infisical.outputs.token }}
        run: |
          infisical run \
            --token="$INFISICAL_TOKEN" \
            --projectId="$INFISICAL_PROJECT_ID" \
            --env="${{ inputs.infisical_env }}" \
            --domain="$INFISICAL_API_URL" \
            --silent \
            -- bash -c 'HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DOKPLOY_WEBHOOK_URL"); echo "Dokploy responded with HTTP $HTTP_CODE"; if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then echo "::error::Dokploy webhook failed with HTTP $HTTP_CODE"; exit 1; fi'

      # Firing the webhook only tells Dokploy to *start* pulling the new image.
      # Poll /health until the deployed env serves 200 AND reports the SHA we
      # just built, so a failed redeploy (stale/gone container) fails the job
      # instead of going silently unnoticed — the class behind the 4-day
      # staging outage (postmortem action #5).
      - name: Post-deploy health gate
        env:
          HEALTH_BASE_URL: ${{ inputs.health_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          HEALTH_URL="${HEALTH_BASE_URL%/}/health"
          TIMEOUT_SECONDS=300
          INTERVAL_SECONDS=10
          DEADLINE=$((SECONDS + TIMEOUT_SECONDS))
          echo "Polling $HEALTH_URL for sha $EXPECTED_SHA (timeout ${TIMEOUT_SECONDS}s, interval ${INTERVAL_SECONDS}s)"
          attempt=0
          while [ "$SECONDS" -lt "$DEADLINE" ]; do
            attempt=$((attempt + 1))
            BODY=$(curl -fsS --max-time 10 "$HEALTH_URL" 2>/dev/null || true)
            if [ -n "$BODY" ]; then
              REPORTED_SHA=$(printf '%s' "$BODY" | jq -r '.sha // empty' 2>/dev/null || true)
              if [ "$REPORTED_SHA" = "$EXPECTED_SHA" ]; then
                echo "Health gate passed on attempt $attempt: $HEALTH_URL reports sha $REPORTED_SHA"
                exit 0
              fi
              echo "Attempt $attempt: reported sha '${REPORTED_SHA:-<none>}' != expected '$EXPECTED_SHA' (still rolling out)"
            else
              echo "Attempt $attempt: $HEALTH_URL not responding yet"
            fi
            sleep "$INTERVAL_SECONDS"
          done
          echo "::error::Health gate timed out after ${TIMEOUT_SECONDS}s — $HEALTH_URL never reported sha $EXPECTED_SHA. The redeploy likely failed and the environment may be serving a stale build or nothing at all."
          exit 1

      # No new secrets: uses the built-in GITHUB_TOKEN. Opens (or comments on an
      # existing) issue labeled deploy-failure so a red deploy is a visible,
      # trackable signal. GitHub additionally emails the actor who triggered the
      # run on failure. Runs on ANY prior step failure, incl. the health gate.
      - name: Alert on deploy failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV_NAME: ${{ inputs.infisical_env }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TITLE="Deploy failed: ${ENV_NAME}"
          BODY=$(printf 'Deploy to **%s** failed.\n\n- Run: %s\n- Commit: %s\n- Workflow: %s\n\nA step failed (build, Convex deploy, image push, Dokploy webhook, or the post-deploy health gate). The environment may be serving a stale build or nothing — this is the failure class behind the 4-day staging outage. Investigate the run, then close this issue once the environment serves again.' "$ENV_NAME" "$RUN_URL" "$COMMIT_SHA" "$GITHUB_WORKFLOW")
          # Ensure the label exists (no-op if it already does).
          gh label create deploy-failure --color B60205 --description "Automated deploy failure alert" 2>/dev/null || true
          # Reuse the open alert for this environment if one exists, else open one.
          NUMBER=$(gh issue list --label deploy-failure --state open --json number,title \
            --jq "map(select(.title == \"$TITLE\")) | .[0].number // empty")
          if [ -n "$NUMBER" ]; then
            gh issue comment "$NUMBER" --body "$BODY"
            echo "Commented on existing deploy-failure issue #$NUMBER"
          else
            gh issue create --title "$TITLE" --label deploy-failure --body "$BODY"
            echo "Opened a new deploy-failure issue for $ENV_NAME"
          fi
