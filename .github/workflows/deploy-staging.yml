name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    # A called workflow can only narrow these, never widen them: if deploy.yml's
    # job asks for a scope missing here, the whole run is rejected at startup
    # (startup_failure, zero jobs) instead of failing a step. issues:write is
    # required by its "Alert on deploy failure" step.
    permissions:
      contents: read
      packages: write
      issues: write
    with:
      infisical_env: staging
      image_tag: staging
      health_url: https://staging.tavliai.com
